name: GTFS Poll

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # allow manual trigger from the Actions tab

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit logger.txt / times.txt back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests gtfs-realtime-bindings

      - name: Run GTFS poller
        run: python main.py

      - name: Commit updated state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logger.txt times.txt
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update logger and times [skip ci]"
          git push
