name: Run My Periodic Script

on:
  schedule:
    # This uses Cron syntax. '0 0 * * *' means "Every day at 00:00 UTC"
    - cron: '*/10 * * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # If you don't have a requirements file, use: pip install requests (etc)

      - name: Run script
        run: python your_script_name.py